apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: collector-shop
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/NoahSmo/POC-Collector-Shop.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: collector-shop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
