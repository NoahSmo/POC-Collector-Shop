apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector-backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: collector-shop-backend:local
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: collector-backend-service
spec:
  type: NodePort # Allows local testing outside the cluster via minikube service
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30080
