
services:
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    environment:
      - VITE_STRIPE_PUBLIC_KEY=pk_test_51T58wFFsomm6awiGH7IwIdI2e5TzQon31sg0auk7ZN7MBOdo09k99aC1VoRLq4xBXLuSSN4D5kGsEvsb5wgMchur00PNxi8MdE
    networks:
      - poc-network

  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - LOG_LEVEL=debug
      - JWT_SECRET=poc-super-secret-key-for-local-dev
      - DATABASE_URL=postgresql://root:rootpassword@postgres:5432/collector_db
      - STRIPE_SECRET_KEY=sk_test_REPLACE_WITH_YOUR_STRIPE_KEY
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - postgres
    networks:
      - poc-network

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: collector_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - poc-network

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    networks:
      - poc-network

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - poc-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - poc-network

networks:
  poc-network:
    driver: bridge

volumes:
  postgres_data:
