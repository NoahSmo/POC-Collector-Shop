name: Collector-Shop DevSecOps Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ──────────────────────────────────────────────
  # 1. LINT — Code quality & conventions
  # ──────────────────────────────────────────────
  lint:
    name: 🔍 Linting (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./services/backend/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint --if-present

  # ──────────────────────────────────────────────
  # 2. TEST — Unit & Integration tests + Coverage
  # ──────────────────────────────────────────────
  test:
    name: 🧪 Tests & Coverage (Jest)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ./services/backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./services/backend/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Run Unit & Integration Tests with Coverage
        run: npm test -- --coverage

  # ──────────────────────────────────────────────
  # 3. BUILD — Compile TypeScript + Prisma
  # ──────────────────────────────────────────────
  build:
    name: 🔨 Build Application
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ./services/backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./services/backend/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Build TypeScript + Prisma
        run: npm run build

  # ──────────────────────────────────────────────
  # 4. SAST — Static Application Security Testing
  # ──────────────────────────────────────────────
  sast:
    name: 🛡️ CodeQL (SAST)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ──────────────────────────────────────────────
  # 5. SCA — Software Composition Analysis
  # ──────────────────────────────────────────────
  sca:
    name: 🔓 Trivy (SCA)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Scan for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './services/backend'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
